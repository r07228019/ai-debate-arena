<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>%%TITLE%%</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #151a27;
      --sidebar-bg: #080b14;
      --border: #2a3142;
      --text: #e6edf3;
      --text-muted: #8b94a7;
      --accent: #ef4444;
      --accent-2: #3b82f6;
      --accent-glow: rgba(239, 68, 68, 0.2);
      --header-height: 3.5rem;
      --sidebar-width: 240px;
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: radial-gradient(ellipse at top, #1a1f2e 0%, var(--bg) 50%);
      background-attachment: fixed;
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      z-index: 1000;
      transition: width 0.1s linear;
    }

    header {
      position: sticky;
      top: 0; z-index: 100;
      height: var(--header-height);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      background: rgba(8, 11, 20, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: height 0.3s ease;
    }
    header.shrunk { height: 2.6rem; }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .header-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; transition: font-size 0.3s ease; }
    header.shrunk .header-title { font-size: 0.875rem; }
    .header-title i { color: var(--accent); margin-right: 0.3rem; }
    .hamburger {
      display: none;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      padding: 0.3rem 0.6rem;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1;
    }
    .hamburger:hover { color: var(--text); border-color: var(--accent); }

    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      min-height: calc(100vh - var(--header-height));
    }

    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      position: sticky;
      top: var(--header-height);
      height: calc(100vh - var(--header-height));
      overflow-y: auto;
    }
    .sidebar-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      padding: 0 1.25rem;
      margin-bottom: 0.6rem;
    }
    .sidebar ul { list-style: none; }
    .sidebar li {
      opacity: 0;
      animation: slideInLeft 0.3s ease forwards;
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .sidebar a {
      display: block;
      padding: 0.55rem 1.25rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      text-decoration: none;
      position: relative;
      transition: color 0.2s, background 0.2s;
      border-left: 3px solid transparent;
    }
    .sidebar a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border-left-color: var(--accent);
    }
    .sidebar a[aria-current] {
      color: #fff;
      font-weight: 600;
      background: var(--accent-glow);
      border-left-color: var(--accent);
    }
    .sidebar .entry-topic {
      display: block;
      font-size: 0.78rem;
      line-height: 1.35;
      margin-top: 0.15rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .content {
      padding: 2.25rem 2.5rem 4rem;
      max-width: 960px;
      animation: fadeIn 0.4s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Hero */
    .hero {
      position: relative;
      overflow: hidden;
      padding: 2rem 2.25rem;
      margin-bottom: 2.25rem;
      background: linear-gradient(135deg, #1e1b2e 0%, #0f1020 55%, #1a0f14 100%);
      border-radius: 14px;
      border: 1px solid rgba(239, 68, 68, 0.25);
    }
    .hero::before {
      content: '';
      position: absolute;
      right: -40px; top: -40px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(239,68,68,0.25), transparent 70%);
      pointer-events: none;
    }
    .hero-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
    }
    .hero-date { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.5rem; }
    .hero-topic {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.4;
      color: #f0f6fc;
      letter-spacing: -0.01em;
      margin-bottom: 0.8rem;
    }
    .hero-description {
      font-size: 0.95rem;
      color: #adbac7;
      line-height: 1.7;
    }

    /* Source */
    .source-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1.25rem;
      margin-bottom: 2.25rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .source-box a {
      color: var(--accent-2);
      text-decoration: none;
      border-bottom: 1px dotted rgba(59,130,246,0.5);
    }
    .source-box a:hover { color: #93c5fd; }
    .source-box .tag {
      background: rgba(239,68,68,0.15);
      color: var(--accent);
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
      font-size: 0.72rem;
    }

    /* Round section */
    .round-heading {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      margin: 2.5rem 0 1.25rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .round-heading .round-num {
      background: var(--accent);
      color: #fff;
      width: 1.6rem; height: 1.6rem;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
    }

    /* Debate message card */
    .msg {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      animation: fadeIn 0.4s ease both;
    }
    .msg-avatar {
      flex-shrink: 0;
      width: 2.75rem; height: 2.75rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      background: var(--surface);
      border: 2px solid var(--accent-color, var(--accent));
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    .msg-body {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-color, var(--accent));
      border-radius: 10px;
      padding: 0.9rem 1.2rem;
    }
    .msg-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.55rem;
      font-size: 0.9rem;
    }
    .msg-name { font-weight: 600; color: var(--accent-color, var(--accent)); }
    .msg-desc { font-size: 0.75rem; color: var(--text-muted); }
    .msg-text {
      font-size: 0.95rem;
      line-height: 1.8;
      color: #cdd9e5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Judge */
    .judge {
      margin-top: 3rem;
      padding: 1.75rem 2rem;
      background: linear-gradient(135deg, #1c1a2e 0%, #0f1020 100%);
      border-radius: 12px;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .judge-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent-2);
      margin-bottom: 1rem;
    }
    .judge h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 1.4rem 0 0.5rem;
      color: #f0f6fc;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }
    .judge h2:first-of-type { margin-top: 0; }
    .judge p { margin-bottom: 0.7rem; color: #adbac7; line-height: 1.8; font-size: 0.93rem; }
    .judge ul, .judge ol { padding-left: 1.5rem; margin-bottom: 0.9rem; color: #adbac7; }
    .judge li { margin-bottom: 0.3rem; line-height: 1.75; font-size: 0.93rem; }
    .judge strong { color: #cdd9e5; font-weight: 600; }

    /* giscus */
    .comments {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    .comments-heading {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .comments-placeholder {
      padding: 1.5rem;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Index page */
    .index-hero {
      text-align: center;
      padding: 3rem 1rem 2rem;
      margin-bottom: 2rem;
    }
    .index-hero h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.8rem;
      background: linear-gradient(90deg, #f0f6fc 0%, #ef4444 40%, #3b82f6 60%, #f0f6fc 100%);
      background-size: 300% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 6s linear infinite;
    }
    @keyframes shimmer {
      from { background-position: 300% center; }
      to   { background-position: -300% center; }
    }
    .index-hero p { color: var(--text-muted); font-size: 0.95rem; max-width: 560px; margin: 0 auto; }

    .debate-list {
      display: grid;
      gap: 1rem;
    }
    .debate-card {
      display: block;
      padding: 1.25rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .debate-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .debate-card-date {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }
    .debate-card-topic {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 0.5rem;
      line-height: 1.4;
    }
    .debate-card-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .debate-card-personas {
      font-size: 0.95rem;
      letter-spacing: 0.2rem;
    }

    .site-footer {
      text-align: center;
      padding: 1.5rem 1rem;
      margin-top: 3rem;
      color: var(--text-muted);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
    }
    .site-footer a { color: var(--accent-2); text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }

    #back-to-top {
      position: fixed;
      bottom: 2rem; right: 2rem;
      width: 2.5rem; height: 2.5rem;
      border-radius: 50%;
      background: var(--accent); color: #fff;
      border: none; cursor: pointer;
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px var(--accent-glow);
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s, background 0.2s;
      pointer-events: none;
    }
    #back-to-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #back-to-top:hover { background: #dc2626; }

    .overlay {
      display: none; position: fixed;
      inset: 0; top: var(--header-height);
      background: rgba(0,0,0,0.6); z-index: 98;
      backdrop-filter: blur(2px);
    }
    .overlay.open { display: block; }

    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .hamburger { display: block; }
      .sidebar {
        position: fixed;
        top: var(--header-height); left: -100%;
        width: var(--sidebar-width);
        height: calc(100vh - var(--header-height));
        z-index: 99;
        transition: left 0.3s ease;
      }
      .sidebar.open { left: 0; }
      .content { padding: 1.5rem 1.25rem; }
      .hero { padding: 1.5rem 1.25rem; }
      .hero-topic { font-size: 1.25rem; }
      .index-hero h1 { font-size: 1.75rem; }
    }
  </style>
</head>
<body>
  <div id="progress-bar"></div>

  <header>
    <div class="header-inner">
      <span class="header-title"><i class="ph-fill ph-chats-circle"></i> AI Debate Arena</span>
      <button class="hamburger" id="hamburger" aria-label="選單">☰</button>
    </div>
  </header>

  <div class="overlay" id="overlay"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <p class="sidebar-label">歷史辯論</p>
      <ul>
%%SIDEBAR%%
      </ul>
    </aside>
    <article class="content">
%%BODY_HTML%%
    </article>
  </div>

  <footer class="site-footer">
    <p>
      <i class="ph ph-robot"></i>
      Powered by <a href="https://www.anthropic.com" target="_blank" rel="noopener">Claude Opus 4.7</a>
      &nbsp;·&nbsp; Topics from <a href="https://www.ptt.cc" target="_blank" rel="noopener">PTT</a>
      &nbsp;·&nbsp; Auto-generated daily
    </p>
  </footer>

  <button id="back-to-top" aria-label="回到頂部">↑</button>

  <script>
    const bar = document.getElementById('progress-bar');
    window.addEventListener('scroll', () => {
      const d = document.documentElement;
      bar.style.width = (d.scrollTop / (d.scrollHeight - d.clientHeight) * 100) + '%';
    });

    const btn = document.getElementById('back-to-top');
    window.addEventListener('scroll', () => btn.classList.toggle('visible', window.scrollY > 300));
    btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    hamburger.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
    });
    overlay.addEventListener('click', () => {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    });

    window.addEventListener('scroll', () => {
      document.querySelector('header').classList.toggle('shrunk', window.scrollY > 60);
    });
  </script>
  %%GISCUS%%
</body>
</html>
